<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" width="280" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="280" height="180" fill="url(#bg)"/>

  <!-- Simplified map-like regions -->
  <!-- Row 1 -->
  <polygon points="20,40 70,40 70,80 20,80" fill="#E74C3C" stroke="#111" stroke-width="1.5"/>
  <polygon points="70,40 130,40 130,75 70,80" fill="#3498DB" stroke="#111" stroke-width="1.5"/>
  <polygon points="130,40 190,40 190,80 130,75" fill="#2ECC71" stroke="#111" stroke-width="1.5"/>
  <polygon points="190,40 250,40 260,80 190,80" fill="#F1C40F" stroke="#111" stroke-width="1.5"/>

  <!-- Row 2 -->
  <polygon points="20,80 70,80 65,125 20,125" fill="#2ECC71" stroke="#111" stroke-width="1.5"/>
  <polygon points="70,80 130,75 135,125 65,125" fill="#F1C40F" stroke="#111" stroke-width="1.5"/>
  <polygon points="130,75 190,80 185,125 135,125" fill="#E74C3C" stroke="#111" stroke-width="1.5"/>
  <polygon points="190,80 260,80 255,125 185,125" fill="#9B59B6" stroke="#111" stroke-width="1.5"/>

  <!-- Row 3 -->
  <polygon points="20,125 65,125 70,155 20,155" fill="#E67E22" stroke="#111" stroke-width="1.5"/>
  <polygon points="65,125 135,125 140,155 70,155" fill="#3498DB" stroke="#111" stroke-width="1.5"/>
  <polygon points="135,125 185,125 180,155 140,155" fill="#E67E22" stroke="#111" stroke-width="1.5"/>
  <polygon points="185,125 255,125 260,155 180,155" fill="#2ECC71" stroke="#111" stroke-width="1.5"/>

  <!-- Title -->
  <text x="140" y="21" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Segoe UI,sans-serif" font-size="13" font-weight="700">🗺️ Cartographer</text>
</svg>
