<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartographer</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; overflow: hidden; }
    .region-path { transition: filter 0.1s; }
    .region-path.clickable { cursor: pointer; }
    .region-path.clickable:hover { filter: brightness(0.82); }
    @keyframes invalidFlash {
      0%   { filter: brightness(1) saturate(1); }
      30%  { filter: brightness(0.5) saturate(3) hue-rotate(300deg); }
      70%  { filter: brightness(0.5) saturate(3) hue-rotate(300deg); }
      100% { filter: brightness(1) saturate(1); }
    }
    .invalid-flash { animation: invalidFlash 0.45s ease-out; }
    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(540deg); opacity: 0; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .slide-in { animation: slideIn 0.25s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ── Color palette ──────────────────────────────────────────────────
    const COLORS = [
      { id: 'red',    name: 'Red',    hex: '#E74C3C' },
      { id: 'blue',   name: 'Blue',   hex: '#3498DB' },
      { id: 'green',  name: 'Green',  hex: '#2ECC71' },
      { id: 'yellow', name: 'Yellow', hex: '#F1C40F' },
      { id: 'orange', name: 'Orange', hex: '#E67E22' },
      { id: 'purple', name: 'Purple', hex: '#9B59B6' },
    ];

    // ── US state data ──────────────────────────────────────────────────
    const US_NAMES = {
      '01':'Alabama','02':'Alaska','04':'Arizona','05':'Arkansas','06':'California',
      '08':'Colorado','09':'Connecticut','10':'Delaware','12':'Florida','13':'Georgia',
      '15':'Hawaii','16':'Idaho','17':'Illinois','18':'Indiana','19':'Iowa',
      '20':'Kansas','21':'Kentucky','22':'Louisiana','23':'Maine','24':'Maryland',
      '25':'Massachusetts','26':'Michigan','27':'Minnesota','28':'Mississippi',
      '29':'Missouri','30':'Montana','31':'Nebraska','32':'Nevada',
      '33':'New Hampshire','34':'New Jersey','35':'New Mexico','36':'New York',
      '37':'North Carolina','38':'North Dakota','39':'Ohio','40':'Oklahoma',
      '41':'Oregon','42':'Pennsylvania','44':'Rhode Island','45':'South Carolina',
      '46':'South Dakota','47':'Tennessee','48':'Texas','49':'Utah','50':'Vermont',
      '51':'Virginia','53':'Washington','54':'West Virginia','55':'Wisconsin','56':'Wyoming',
    };
    const US_ABBR = {
      '01':'AL','02':'AK','04':'AZ','05':'AR','06':'CA','08':'CO','09':'CT',
      '10':'DE','12':'FL','13':'GA','15':'HI','16':'ID','17':'IL','18':'IN',
      '19':'IA','20':'KS','21':'KY','22':'LA','23':'ME','24':'MD','25':'MA',
      '26':'MI','27':'MN','28':'MS','29':'MO','30':'MT','31':'NE','32':'NV',
      '33':'NH','34':'NJ','35':'NM','36':'NY','37':'NC','38':'ND','39':'OH',
      '40':'OK','41':'OR','42':'PA','44':'RI','45':'SC','46':'SD','47':'TN',
      '48':'TX','49':'UT','50':'VT','51':'VA','53':'WA','54':'WV','55':'WI','56':'WY',
    };

    // ── Africa data ────────────────────────────────────────────────────
    const AFRICA_IDS = new Set([
      12,24,204,72,854,108,120,140,148,178,180,262,818,226,232,231,
      266,270,288,324,624,384,404,426,430,434,450,454,466,478,504,
      508,516,562,566,646,686,694,706,710,728,729,748,768,788,800,
      834,894,716,
    ]);
    const AFRICA_NAMES = {
      12:'Algeria',24:'Angola',204:'Benin',72:'Botswana',854:'Burkina Faso',
      108:'Burundi',120:'Cameroon',140:'C.A.R.',148:'Chad',178:'Congo',
      180:'DR Congo',262:'Djibouti',818:'Egypt',226:'Eq. Guinea',232:'Eritrea',
      231:'Ethiopia',266:'Gabon',270:'Gambia',288:'Ghana',324:'Guinea',
      624:'Guinea-Bissau',384:"Côte d'Ivoire",404:'Kenya',426:'Lesotho',
      430:'Liberia',434:'Libya',450:'Madagascar',454:'Malawi',466:'Mali',
      478:'Mauritania',504:'Morocco',508:'Mozambique',516:'Namibia',562:'Niger',
      566:'Nigeria',646:'Rwanda',686:'Senegal',694:'Sierra Leone',706:'Somalia',
      710:'South Africa',728:'South Sudan',729:'Sudan',748:'Eswatini',768:'Togo',
      788:'Tunisia',800:'Uganda',834:'Tanzania',894:'Zambia',716:'Zimbabwe',
    };

    // ── Map configurations ─────────────────────────────────────────────
    const MAP_CONFIGS = {
      us: {
        label: 'United States',
        url: 'https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json',
        objectName: 'states',
        filterGeom: g => g.id !== 11,            // exclude DC
        getId: id => String(id).padStart(2, '0'),
        getName: id => US_NAMES[id] || '',
        getLabel: id => US_ABBR[id] || '',
        makeProjFn: (features, ext) =>
          d3.geoAlbersUsa().fitExtent(ext, { type:'FeatureCollection', features }),
        fontSize: 9,
      },
      africa: {
        label: 'Africa',
        url: 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json',
        objectName: 'countries',
        filterGeom: g => AFRICA_IDS.has(+g.id),
        getId: id => String(id),
        getName: id => AFRICA_NAMES[+id] || '',
        getLabel: id => AFRICA_NAMES[+id] || '',
        makeProjFn: (features, ext) =>
          d3.geoMercator().fitExtent(ext, { type:'FeatureCollection', features }),
        fontSize: 6.5,
      },
    };

    // ── Sound ──────────────────────────────────────────────────────────
    const playSound = (type) => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const note = (freq, t0, dur, vol=0.2, wave='sine') => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = wave; o.frequency.value = freq;
          g.gain.setValueAtTime(vol, ctx.currentTime + t0);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t0 + dur);
          o.start(ctx.currentTime + t0);
          o.stop(ctx.currentTime + t0 + dur + 0.05);
        };
        if (type === 'place')   note(440, 0, 0.12);
        if (type === 'invalid') note(160, 0, 0.28, 0.15, 'sawtooth');
        if (type === 'win')     [523,659,784,1047].forEach((f,i) => note(f, i*0.15, 0.3, 0.25));
      } catch(_) {}
    };

    // ── Component ──────────────────────────────────────────────────────
    function Cartographer() {
      const [selectedMap, setSelectedMap]     = useState('us');
      const [rawTopology, setRawTopology]     = useState(null);
      const [loadError, setLoadError]         = useState('');
      const [mapFeatures, setMapFeatures]     = useState([]);
      const [adjacency, setAdjacency]         = useState({});
      const [svgW, setSvgW]                   = useState(800);
      const [svgH, setSvgH]                   = useState(540);

      // game state
      const [regionColors, setRegionColors]   = useState({});
      const [currentPlayer, setCurrentPlayer] = useState(1);
      const [selectedColor, setSelectedColor] = useState(null);
      const [gameStatus, setGameStatus]       = useState('playing');
      const [message, setMessage]             = useState(null);
      const [flashRegion, setFlashRegion]     = useState(null);
      const [confetti, setConfetti]           = useState([]);

      const containerRef = useRef(null);

      // ── Measure map container ──
      useEffect(() => {
        const measure = () => {
          if (containerRef.current) {
            const r = containerRef.current.getBoundingClientRect();
            setSvgW(r.width  || 800);
            setSvgH(r.height || 540);
          }
        };
        measure();
        const ro = new ResizeObserver(measure);
        if (containerRef.current) ro.observe(containerRef.current);
        return () => ro.disconnect();
      }, []);

      // ── Fetch topology when map selection changes ──
      useEffect(() => {
        setRawTopology(null);
        setLoadError('');
        setMapFeatures([]);
        setAdjacency({});
        resetGame();
        d3.json(MAP_CONFIGS[selectedMap].url)
          .then(setRawTopology)
          .catch(() => setLoadError('Could not load map. Check your internet connection.'));
      }, [selectedMap]);

      // ── Compute projected features when topology or SVG size changes ──
      useEffect(() => {
        if (!rawTopology || svgW < 50) return;
        const cfg = MAP_CONFIGS[selectedMap];
        const pad = 24;
        const topPad = 48; // room for title
        const ext = [[pad, topPad], [svgW - pad, svgH - pad]];

        const allGeoms  = rawTopology.objects[cfg.objectName].geometries;
        const filtered  = allGeoms.filter(cfg.filterGeom);

        // Adjacency via shared TopoJSON arcs
        const nbIndices = topojson.neighbors(filtered);
        const adj = {};
        filtered.forEach((g, i) => {
          const id = cfg.getId(g.id);
          adj[id] = new Set(nbIndices[i].map(j => cfg.getId(filtered[j].id)));
        });

        // Build sub-topology so topojson.feature works on filtered set
        const subTopo = {
          ...rawTopology,
          objects: {
            [cfg.objectName]: {
              ...rawTopology.objects[cfg.objectName],
              geometries: filtered,
            },
          },
        };
        const features = topojson.feature(subTopo, subTopo.objects[cfg.objectName]).features;

        // Projection fitted to SVG
        const proj    = cfg.makeProjFn(features, ext);
        const pathGen = d3.geoPath().projection(proj);

        const processed = features.map(f => {
          const id     = cfg.getId(f.id);
          const pathD  = pathGen(f);
          const ctr    = pathGen.centroid(f);
          return {
            id,
            name:    cfg.getName(id),
            label:   cfg.getLabel(id),
            pathD,
            centroid: (ctr && !isNaN(ctr[0]) && !isNaN(ctr[1])) ? ctr : null,
          };
        }).filter(f => f.pathD);

        setMapFeatures(processed);
        setAdjacency(adj);
      }, [rawTopology, svgW, svgH, selectedMap]);

      // ── Game helpers ──
      const resetGame = () => {
        setRegionColors({});
        setCurrentPlayer(1);
        setSelectedColor(null);
        setGameStatus('playing');
        setMessage(null);
        setFlashRegion(null);
        setConfetti([]);
      };

      const handleColorClick = (colorId) => {
        if (gameStatus !== 'playing') return;
        setSelectedColor(id => id === colorId ? null : colorId);
        setMessage(null);
      };

      const handleRegionClick = useCallback((regionId) => {
        if (gameStatus !== 'playing') return;

        if (!selectedColor) {
          setMessage({ text: 'Pick a color first!', type: 'info' });
          return;
        }
        if (regionColors[regionId]) {
          setMessage({ text: 'That region is already colored.', type: 'info' });
          return;
        }

        // Adjacency check
        const neighbors = adjacency[regionId] || new Set();
        const colorName = COLORS.find(c => c.id === selectedColor)?.name || '';
        if ([...neighbors].some(nId => regionColors[nId] === selectedColor)) {
          setMessage({ text: `Can't use ${colorName} here — a neighboring region already has that color!`, type: 'error' });
          setFlashRegion(regionId);
          playSound('invalid');
          setTimeout(() => setFlashRegion(null), 450);
          return;
        }

        // Apply
        const newColors = { ...regionColors, [regionId]: selectedColor };
        setRegionColors(newColors);
        setMessage(null);
        playSound('place');

        // Win check
        if (Object.keys(newColors).length === mapFeatures.length) {
          setGameStatus('won');
          playSound('win');
          const cols = ['#E74C3C','#3498DB','#2ECC71','#F1C40F','#E67E22','#9B59B6'];
          setConfetti(Array.from({ length: 50 }, (_, i) => ({
            id: i,
            left: Math.random() * 100,
            color: cols[i % cols.length],
            size: 7 + Math.random() * 9,
            delay: Math.random() * 1.2,
            dur: 2.5 + Math.random() * 2,
          })));
          return;
        }

        setCurrentPlayer(p => p === 1 ? 2 : 1);
        setSelectedColor(null);
      }, [gameStatus, selectedColor, regionColors, adjacency, mapFeatures.length]);

      // ── Derived values ──
      const coloredCount = Object.keys(regionColors).length;
      const totalCount   = mapFeatures.length;
      const progress     = totalCount > 0 ? (coloredCount / totalCount) * 100 : 0;

      const isStuck = useMemo(() => {
        if (gameStatus !== 'playing' || totalCount === 0) return false;
        const uncolored = mapFeatures.filter(f => !regionColors[f.id]);
        if (uncolored.length === 0) return false;
        return uncolored.every(f => {
          const nbs = adjacency[f.id] || new Set();
          const used = new Set([...nbs].map(n => regionColors[n]).filter(Boolean));
          return COLORS.every(c => used.has(c.id));
        });
      }, [mapFeatures, regionColors, adjacency, gameStatus, totalCount]);

      const cfg = MAP_CONFIGS[selectedMap];
      const p1col = '#FF6B6B';
      const p2col = '#4ECDC4';
      const pcol  = currentPlayer === 1 ? p1col : p2col;

      // ── Render ──
      return (
        <div
          className="flex flex-col"
          style={{
            height: '100vh',
            background: 'linear-gradient(135deg,#1a1a2e 0%,#16213e 55%,#0f3460 100%)',
            fontFamily: "'Segoe UI',sans-serif",
          }}
        >
          {/* Header */}
          <header
            className="flex items-center justify-between px-5 py-2 flex-shrink-0"
            style={{ background: 'rgba(0,0,0,0.35)', borderBottom: '1px solid rgba(255,255,255,0.08)' }}
          >
            <h1 className="text-2xl font-bold text-white tracking-wide select-none">
              🗺️ Cartographer
            </h1>
            <div className="flex items-center gap-3">
              <select
                value={selectedMap}
                onChange={e => setSelectedMap(e.target.value)}
                className="text-white text-sm px-3 py-1.5 rounded-lg border cursor-pointer"
                style={{ background: 'rgba(255,255,255,0.1)', borderColor: 'rgba(255,255,255,0.2)' }}
              >
                {Object.entries(MAP_CONFIGS).map(([k, c]) => (
                  <option key={k} value={k} style={{ background: '#16213e' }}>{c.label}</option>
                ))}
              </select>
              <a
                href="../index.html"
                className="text-sm px-3 py-1.5 rounded-lg border transition"
                style={{ color: 'rgba(255,255,255,0.65)', borderColor: 'rgba(255,255,255,0.18)', background: 'rgba(255,255,255,0.05)' }}
              >
                ← Back
              </a>
            </div>
          </header>

          {/* Body */}
          <div className="flex flex-1 overflow-hidden">
            {/* Map area */}
            <div className="flex-1 relative overflow-hidden" ref={containerRef}>
              {loadError ? (
                <div className="absolute inset-0 flex items-center justify-center">
                  <p className="text-red-400 text-base">{loadError}</p>
                </div>
              ) : !rawTopology || mapFeatures.length === 0 ? (
                <div className="absolute inset-0 flex items-center justify-center">
                  <p className="text-white/50 text-lg">Loading {cfg.label}…</p>
                </div>
              ) : (
                <svg width={svgW} height={svgH} style={{ display: 'block' }}>
                  {/* Title */}
                  <text
                    x={svgW / 2} y={28}
                    textAnchor="middle"
                    fill="rgba(255,255,255,0.45)"
                    fontSize="15" fontWeight="700"
                    style={{ userSelect: 'none' }}
                  >
                    {cfg.label}
                  </text>

                  {/* Regions */}
                  {mapFeatures.map(f => {
                    const col     = regionColors[f.id];
                    const hexFill = col ? COLORS.find(c => c.id === col)?.hex : '#cccccc';
                    const flash   = flashRegion === f.id;
                    return (
                      <g key={f.id} onClick={() => handleRegionClick(f.id)}>
                        <path
                          d={f.pathD}
                          fill={hexFill}
                          stroke="#111827"
                          strokeWidth="0.7"
                          strokeLinejoin="round"
                          className={
                            'region-path' +
                            (gameStatus === 'playing' && !col ? ' clickable' : '') +
                            (flash ? ' invalid-flash' : '')
                          }
                        />
                        {f.centroid && f.label && (
                          <text
                            x={f.centroid[0]} y={f.centroid[1]}
                            textAnchor="middle" dominantBaseline="middle"
                            fontSize={cfg.fontSize}
                            fontWeight="700"
                            fill={col ? 'rgba(0,0,0,0.7)' : '#444'}
                            style={{ pointerEvents: 'none', userSelect: 'none' }}
                          >
                            {f.label}
                          </text>
                        )}
                      </g>
                    );
                  })}
                </svg>
              )}

              {/* Confetti */}
              {confetti.map(p => (
                <div
                  key={p.id}
                  style={{
                    position: 'absolute',
                    left: p.left + '%',
                    top: -16,
                    width: p.size,
                    height: p.size,
                    background: p.color,
                    borderRadius: p.id % 3 === 0 ? '50%' : '2px',
                    pointerEvents: 'none',
                    animation: `confettiFall ${p.dur}s ease-out ${p.delay}s forwards`,
                  }}
                />
              ))}
            </div>

            {/* Side panel */}
            <div
              className="flex-shrink-0 flex flex-col gap-3 p-4 overflow-y-auto"
              style={{
                width: 220,
                background: 'rgba(0,0,0,0.32)',
                borderLeft: '1px solid rgba(255,255,255,0.08)',
              }}
            >
              {gameStatus === 'playing' && (
                <>
                  {/* Player turn */}
                  <div
                    className="rounded-xl p-3 text-center"
                    style={{
                      background: `${pcol}18`,
                      border: `2px solid ${pcol}`,
                    }}
                  >
                    <div className="text-xs text-white/40 uppercase tracking-widest mb-0.5">Your Turn</div>
                    <div className="text-xl font-bold" style={{ color: pcol }}>
                      Player {currentPlayer}
                    </div>
                  </div>

                  {/* Color picker */}
                  <div>
                    <div className="text-xs text-white/40 uppercase tracking-widest mb-2">Pick a Color</div>
                    <div className="grid grid-cols-3 gap-1.5">
                      {COLORS.map(c => (
                        <button
                          key={c.id}
                          title={c.name}
                          onClick={() => handleColorClick(c.id)}
                          className="rounded-lg h-9 transition-all"
                          style={{
                            background: c.hex,
                            border: selectedColor === c.id
                              ? '3px solid #fff'
                              : '3px solid rgba(255,255,255,0.12)',
                            transform: selectedColor === c.id ? 'scale(1.12)' : 'scale(1)',
                            boxShadow: selectedColor === c.id ? `0 0 10px ${c.hex}99` : 'none',
                          }}
                        />
                      ))}
                    </div>
                    <p className="text-xs text-center mt-2" style={{ color: 'rgba(255,255,255,0.35)' }}>
                      {selectedColor
                        ? `Now click a region →`
                        : 'Select a color above'}
                    </p>
                  </div>

                  {/* Progress */}
                  <div>
                    <div className="flex justify-between text-xs mb-1" style={{ color: 'rgba(255,255,255,0.4)' }}>
                      <span>{coloredCount} colored</span>
                      <span>{totalCount - coloredCount} left</span>
                    </div>
                    <div
                      className="w-full h-2.5 rounded-full"
                      style={{ background: 'rgba(255,255,255,0.1)' }}
                    >
                      <div
                        className="h-2.5 rounded-full transition-all duration-300"
                        style={{
                          width: `${progress}%`,
                          background: 'linear-gradient(90deg,#2ECC71,#27AE60)',
                        }}
                      />
                    </div>
                  </div>

                  {/* Message */}
                  {message && (
                    <div
                      key={message.text}
                      className={`rounded-lg px-3 py-2 text-xs leading-snug slide-in ${
                        message.type === 'error'
                          ? 'text-red-300'
                          : 'text-blue-300'
                      }`}
                      style={{
                        background: message.type === 'error'
                          ? 'rgba(231,76,60,0.15)'
                          : 'rgba(52,152,219,0.15)',
                        border: `1px solid ${message.type === 'error' ? 'rgba(231,76,60,0.35)' : 'rgba(52,152,219,0.35)'}`,
                      }}
                    >
                      {message.text}
                    </div>
                  )}

                  {/* Stuck warning */}
                  {isStuck && (
                    <div
                      className="rounded-lg px-3 py-2 text-xs text-center slide-in"
                      style={{
                        color: '#FFA500',
                        background: 'rgba(255,165,0,0.12)',
                        border: '1px solid rgba(255,165,0,0.35)',
                      }}
                    >
                      No valid moves left!<br/>
                      <span style={{ color: 'rgba(255,255,255,0.4)' }}>Consider giving up.</span>
                    </div>
                  )}

                  {/* How to play */}
                  <div
                    className="text-xs leading-relaxed mt-auto"
                    style={{ color: 'rgba(255,255,255,0.28)' }}
                  >
                    <strong style={{ color: 'rgba(255,255,255,0.45)' }}>How to play:</strong>
                    {' '}Players take turns. Each turn: pick a color, then click a region.
                    No two touching regions can share the same color — but corners are OK.
                    Color the whole map together to win!
                  </div>

                  {/* Give up */}
                  <button
                    onClick={() => setGameStatus('lost')}
                    className="rounded-lg py-2 text-sm font-medium transition"
                    style={{
                      color: '#FC8181',
                      border: '1px solid rgba(252,129,129,0.3)',
                      background: 'transparent',
                    }}
                    onMouseOver={e => e.currentTarget.style.background = 'rgba(252,129,129,0.1)'}
                    onMouseOut={e => e.currentTarget.style.background = 'transparent'}
                  >
                    Give Up
                  </button>
                </>
              )}

              {gameStatus === 'won' && (
                <div className="flex flex-col items-center justify-center gap-4 flex-1 text-center py-8">
                  <div style={{ fontSize: 52 }}>🎉</div>
                  <div className="text-2xl font-bold" style={{ color: '#F1C40F' }}>You Win!</div>
                  <div className="text-sm leading-relaxed" style={{ color: 'rgba(255,255,255,0.65)' }}>
                    Amazing! You colored the whole map without breaking the rules. Both players win!
                  </div>
                  <button
                    onClick={resetGame}
                    className="px-6 py-2 rounded-xl text-white font-bold text-sm transition"
                    style={{ background: 'linear-gradient(135deg,#2ECC71,#27AE60)' }}
                  >
                    Play Again
                  </button>
                  <button
                    onClick={() => setSelectedMap(m => m === 'us' ? 'africa' : 'us')}
                    className="px-4 py-2 rounded-xl text-sm transition"
                    style={{
                      color: 'rgba(255,255,255,0.7)',
                      border: '1px solid rgba(255,255,255,0.2)',
                      background: 'transparent',
                    }}
                  >
                    Try {selectedMap === 'us' ? 'Africa' : 'United States'}
                  </button>
                </div>
              )}

              {gameStatus === 'lost' && (
                <div className="flex flex-col items-center justify-center gap-4 flex-1 text-center py-8">
                  <div style={{ fontSize: 52 }}>😔</div>
                  <div className="text-2xl font-bold" style={{ color: '#FC8181' }}>Game Over</div>
                  <div className="text-sm leading-relaxed" style={{ color: 'rgba(255,255,255,0.65)' }}>
                    You gave up! Try again — this time you'll color the whole map!
                  </div>
                  <button
                    onClick={resetGame}
                    className="px-6 py-2 rounded-xl text-white font-bold text-sm transition"
                    style={{ background: 'linear-gradient(135deg,#3498DB,#2980B9)' }}
                  >
                    Try Again
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Cartographer />);
  </script>
</body>
</html>
